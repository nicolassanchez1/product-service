version: '3.8'

services:
  bd_postgres:
    image: postgres:15
    container_name: ecommerce_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ecommerce_db
    ports:
      - '5432:5432'
    volumes:
      - datos_postgres:/var/lib/postgresql/data

volumes:
  datos_postgres: